<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="url(#violet-gradient-popup)"/>
          <path d="M16 16H32V22M24 22V36" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="violet-gradient-popup" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7C3AED"/>
              <stop offset="1" stop-color="#C084FC"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-title">Thymer Clipper</span>
        <span id="connection-indicator" class="connection-status-dot" title="Disconnected"></span>
      </div>
      <button id="settings-btn" class="btn-icon" title="Settings">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    </header>

    <div class="content">
      <div id="unconfigured-state" class="state hidden">
        <p class="desc">Please configure your Thymer account slug and security token in settings before using the clipper.</p>
        <button id="setup-btn" class="btn btn-primary full-width">Configure Settings</button>
      </div>

      <div id="ready-state" class="state">
        <div class="page-info-card">
          <span class="card-label">Saving Page</span>
          <input type="text" id="page-title-input" class="page-title-input" value="Loading page...">
          <div id="page-url" class="page-url">Loading url...</div>
        </div>

        <div class="tag-info-card">
          <span class="card-label">Tags</span>
          <div class="tag-field-container" id="tag-container">
            <input type="text" id="tag-input" class="tag-input" placeholder="Add tag (press Enter)..." autocomplete="off">
          </div>
          <div id="tag-autocomplete" class="tag-autocomplete hidden"></div>
        </div>

        <button id="save-btn" class="btn btn-primary full-width">Save to Thymer</button>
        <button id="highlight-btn" class="btn btn-secondary full-width">Highlight selection</button>
        <button id="diag-btn" class="btn btn-secondary full-width hidden" style="margin-top:4px;font-size:11px;opacity:0.7;">🔍 Run Connection Diagnostics</button>
      </div>
    </div>

    <div id="status-footer" class="footer hidden">
      <div class="status-indicator">
        <span class="spinner hidden" id="spinner"></span>
        <span class="status-text" id="status-text">Saving...</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
